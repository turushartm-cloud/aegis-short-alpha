services:
  - type: web
    name: aegis-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LONG_REDIS_URL
        sync: false  # Добавь вручную в Dashboard
      - key: SHORT_REDIS_URL
        sync: false  # Добавь вручную в Dashboard
      - key: CACHE_TTL
        value: "1800"  # 30 минут кэширования
