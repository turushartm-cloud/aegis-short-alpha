services:
  - type: web
    name: aegis-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LONG_REDIS_URL
        value: "PASTE_LONG_REDIS_URL_HERE"
      - key: SHORT_REDIS_URL
        value: "PASTE_SHORT_REDIS_URL_HERE"
